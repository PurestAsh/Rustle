name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  APP_NAME: rustle
  APP_DISPLAY_NAME: Rustle

jobs:
  linux-appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libasound2-dev \
            libfuse2 \
            fuse \
            imagemagick

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Create AppImage directory structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp target/release/${{ env.APP_NAME }} AppDir/usr/bin/

      - name: Create desktop file
        run: |
          cat > AppDir/usr/share/applications/${{ env.APP_NAME }}.desktop << DESKTOP
          [Desktop Entry]
          Name=${{ env.APP_DISPLAY_NAME }}
          Comment=A modern music player
          Exec=${{ env.APP_NAME }}
          Icon=${{ env.APP_NAME }}
          Type=Application
          Categories=Audio;Music;Player;
          DESKTOP

      - name: Setup icon and AppRun
        run: |
          # Generate 256x256 icon from high-res source
          if [ -f "assets/icons/icon.png" ]; then
            convert assets/icons/icon.png -resize 256x256 AppDir/usr/share/icons/hicolor/256x256/apps/${{ env.APP_NAME }}.png
          else
            convert -size 256x256 xc:pink AppDir/usr/share/icons/hicolor/256x256/apps/${{ env.APP_NAME }}.png 2>/dev/null || touch AppDir/usr/share/icons/hicolor/256x256/apps/${{ env.APP_NAME }}.png
          fi

      - name: Create AppRun script
        run: |
          cat > AppDir/AppRun << APPRUN
          #!/bin/bash
          SELF=\$(readlink -f "\$0")
          HERE=\${SELF%/*}
          export PATH="\${HERE}/usr/bin:\${PATH}"
          export LD_LIBRARY_PATH="\${HERE}/usr/lib:\${LD_LIBRARY_PATH}"
          exec "\${HERE}/usr/bin/${{ env.APP_NAME }}" "\$@"
          APPRUN
          chmod +x AppDir/AppRun

      - name: Link files to AppDir root
        run: |
          ln -sf usr/share/applications/${{ env.APP_NAME }}.desktop AppDir/
          ln -sf usr/share/icons/hicolor/256x256/apps/${{ env.APP_NAME }}.png AppDir/

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir ${{ env.APP_NAME }}-linux-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: ${{ env.APP_NAME }}-linux-x86_64.AppImage

  macos:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-26-intel
            arch: x86_64
          - target: aarch64-apple-darwin
            os: macos-26
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create app bundle directories
        run: |
          mkdir -p "${{ env.APP_DISPLAY_NAME }}.app/Contents/MacOS"
          mkdir -p "${{ env.APP_DISPLAY_NAME }}.app/Contents/Resources"
          cp target/${{ matrix.target }}/release/${{ env.APP_NAME }} "${{ env.APP_DISPLAY_NAME }}.app/Contents/MacOS/"

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Info.plist
        run: |
          cat > "${{ env.APP_DISPLAY_NAME }}.app/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>${{ env.APP_NAME }}</string>
              <key>CFBundleIdentifier</key>
              <string>com.${{ env.APP_NAME }}.app</string>
              <key>CFBundleName</key>
              <string>${{ env.APP_DISPLAY_NAME }}</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleIconName</key>
              <string>AppIcon</string>
              <key>CFBundleVersion</key>
              <string>${{ steps.version.outputs.version }}</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ steps.version.outputs.version }}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.13</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST

      - name: Compile app icon assets
        run: |
          mkdir -p build/macos/AppIcon.icon/Assets
          cp assets/icons/icon.png build/macos/AppIcon.icon/Assets/icon.png
          cat > build/macos/AppIcon.icon/icon.json <<'JSON'
          {
            "fill" : {
              "automatic-gradient" : "extended-srgb:0.00000,0.53333,1.00000,1.00000"
            },
            "groups" : [
              {
                "layers" : [
                {
                  "blend-mode" : "normal",
                  "fill" : "automatic",
                  "glass" : false,
                  "hidden" : false,
                  "image-name" : "icon.png",
                  "name" : "icon",
                  "position" : {
                    "scale" : 0.725,
                    "translation-in-points" : [
                      0,
                      0
                      ]
                    }
                  }
                ],
                "shadow" : {
                  "kind" : "neutral",
                  "opacity" : 0.5
                },
                "translucency" : {
                  "enabled" : true,
                  "value" : 0.5
                }
              }
            ],
            "supported-platforms" : {
              "circles" : [
                "watchOS"
              ],
              "squares" : "shared"
            }
          }
          JSON
          xcrun actool \
            build/macos/AppIcon.icon \
            --compile "${{ env.APP_DISPLAY_NAME }}.app/Contents/Resources" \
            --output-format human-readable-text \
            --notices \
            --warnings \
            --errors \
            --output-partial-info-plist build/macos/appicon-partial.plist \
            --app-icon AppIcon \
            --include-all-app-icons \
            --enable-on-demand-resources NO \
            --development-region en \
            --target-device mac \
            --minimum-deployment-target 26.0 \
            --platform macosx

      - name: Create DMG
        run: |
          hdiutil create -volname "${{ env.APP_DISPLAY_NAME }}" -srcfolder "${{ env.APP_DISPLAY_NAME }}.app" -ov -format UDZO "${{ env.APP_NAME }}-macos-${{ matrix.arch }}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: ${{ env.APP_NAME }}-macos-${{ matrix.arch }}.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install ImageMagick
        run: |
          choco install imagemagick -y

      - name: Generate ICO icon
        shell: pwsh
        run: |
          magick assets/icons/icon.png -define icon:auto-resize=256,128,64,48,32,16 assets/icons/icon.ico

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-msvc

      - name: Build release
        run: cargo build --release

      - name: Rename exe
        shell: pwsh
        run: |
          Move-Item "target/release/${{ env.APP_NAME }}.exe" "${{ env.APP_NAME }}-windows-x86_64.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: ${{ env.APP_NAME }}-windows-x86_64.exe

  release:
    needs: [linux-appimage, macos, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/linux-appimage/*
            artifacts/macos-x86_64/*
            artifacts/macos-arm64/*
            artifacts/windows-x86_64/*
          draft: false
          prerelease: false
          generate_release_notes: true

  aur:
    needs: [release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD versions
        run: |
          sed -i "s/pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" aur/PKGBUILD
          sed -i "s/pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" aur-bin/PKGBUILD

      - name: Publish rustle to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: rustle
          pkgbuild: aur/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.version.outputs.version }}"
          force_push: true

      - name: Publish rustle-bin to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: rustle-bin
          pkgbuild: aur-bin/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.version.outputs.version }}"
          force_push: true
